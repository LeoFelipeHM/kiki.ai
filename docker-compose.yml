services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kiki-backend:latest
    container_name: kiki-backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - kiki-storage:/app/uploads
    env_file:
      - ./backend/.env
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips '*'

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kiki-backend:latest
    container_name: kiki-worker
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - db
    dns:
      - 8.8.8.8
      - 1.1.1.1
    shm_size: '2gb'
    environment:
      - PYTHONUNBUFFERED=1
    command: >
      python livekit_service.py start
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: kiki-frontend:latest
    container_name: kiki-frontend
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
      - db

  db:
    image: pgvector/pgvector:pg17
    container_name: kiki-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=newdays
      - POSTGRES_DB=defaultdb
    ports:
      - "5435:5432"
    volumes:
      - postgres_vector_data:/var/lib/postgresql/data

volumes:
  kiki-storage:
  postgres_vector_data:

